<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <th:block th:replace="~{fragments/csrf-meta :: csrf}"></th:block>
    <title>Manage Bookings — AureviaGrand</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-luxury px-4">
    <th:block th:replace="~{fragments/nav-brand :: brand}"></th:block>
    <div class="ms-auto d-flex align-items-center nav-links-group">
        <a th:href="@{/staff/dashboard}" class="nav-link">Dashboard</a>
        <a th:href="@{/staff/bookings}" class="nav-link active">Bookings</a>
        <a th:href="@{/staff/checkin}" class="nav-link">Check-In/Out</a>
        <form th:action="@{/auth/logout}" method="post" class="mb-0 ms-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn nav-logout-btn btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container section-padding" style="padding-top:120px;">
    <h2 class="mb-4">Booking Management</h2>

    <!-- Flash -->
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
        <a th:href="@{/staff/bookings}" class="btn btn-outline-gold btn-sm">All</a>
        <a th:href="@{/staff/bookings(status='PENDING')}" class="btn btn-outline-gold btn-sm">Pending</a>
        <a th:href="@{/staff/bookings(status='CONFIRMED')}" class="btn btn-outline-gold btn-sm">Confirmed</a>
        <a th:href="@{/staff/bookings(status='CHECKED_IN')}" class="btn btn-outline-gold btn-sm">Checked In</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Guest</th>
                <th>Room</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Nights</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${bookings}">
                <td th:text="${b.id}"></td>
                <td>
                    <div th:text="${b.customer.fullName}"></div>
                    <small class="text-muted"
                           th:text="${b.customer.email}"></small>
                </td>
                <td th:text="'Room ' + ${b.room.roomNumber}"></td>
                <td th:text="${b.checkInDate}"></td>
                <td th:text="${b.checkOutDate}"></td>
                <td th:text="${b.nights}"></td>
                <td th:text="'₹' + ${b.totalPrice}"></td>
                <td>
                        <span class="badge"
                              th:classappend="${b.status.name() == 'PENDING'} ? 'badge-pending' :
                                             (${b.status.name() == 'CONFIRMED'} ? 'badge-confirmed' :
                                             (${b.status.name() == 'CANCELLED'} ? 'badge-cancelled' :
                                             (${b.status.name() == 'CHECKED_IN'} ? 'badge-checked-in' :
                                             'badge-checked-out')))"
                              th:text="${b.status}"></span>
                </td>
                <td>
                    <form th:if="${b.status.name() == 'PENDING'}"
                          th:action="@{/staff/bookings/{id}/confirm(id=${b.id})}"
                          method="post" class="d-inline staff-action-form" data-success-msg="Booking confirmed successfully">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button class="btn btn-success btn-sm" type="submit">Confirm</button>
                    </form>
                    <form th:if="${b.status.name() == 'PENDING'}"
                          th:action="@{/staff/bookings/{id}/reject(id=${b.id})}"
                          method="post" class="d-inline staff-action-form ms-1" data-success-msg="Booking rejected">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button class="btn btn-outline-danger btn-sm" type="submit"
                                onclick="return confirm('Reject this booking?')">Reject</button>
                    </form>
                    <form th:if="${b.status.name() == 'CONFIRMED'}"
                          th:action="@{/staff/checkin/{id}/checkin(id=${b.id})}"
                          method="post" class="d-inline staff-action-form" data-success-msg="Guest checked in successfully">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button class="btn action-btn-checkin btn-sm" type="submit">CHECK IN</button>
                    </form>
                    <form th:if="${b.status.name() == 'CHECKED_IN'}"
                          th:action="@{/staff/checkin/{id}/checkout(id=${b.id})}"
                          method="post" class="d-inline staff-action-form" data-success-msg="Guest checked out successfully">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button class="btn action-btn-checkout btn-sm" type="submit">CHECK OUT</button>
                    </form>
                    <span th:if="${b.status.name() == 'CANCELLED' or b.status.name() == 'CHECKED_OUT'}"
                          class="text-muted small">—</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/staff-ops.js}"></script>
</body>
</html>
