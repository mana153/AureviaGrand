<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <th:block th:replace="~{fragments/csrf-meta :: csrf}"></th:block>
    <title>Check-In / Check-Out — AureviaGrand</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-luxury px-4">
    <th:block th:replace="~{fragments/nav-brand :: brand}"></th:block>
    <div class="ms-auto d-flex align-items-center nav-links-group">
        <a th:href="@{/staff/dashboard}" class="nav-link">Dashboard</a>
        <a th:href="@{/staff/bookings}" class="nav-link">Bookings</a>
        <a th:href="@{/staff/checkin}" class="nav-link active">Check-In/Out</a>
        <form th:action="@{/auth/logout}" method="post" class="mb-0 ms-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn nav-logout-btn btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container section-padding" style="padding-top:120px;">
    <h2 class="mb-4">Check-In / Check-Out</h2>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Guest</th>
                <th>Room</th>
                <th>Check-In Date</th>
                <th>Check-Out Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${bookings}" th:attr="data-booking-id=${b.id}"
                th:if="${b.status.name() == 'CONFIRMED' or b.status.name() == 'CHECKED_IN'}">
                <td th:text="${b.id}"></td>
                <td>
                    <div th:text="${b.customer.fullName}"></div>
                    <small class="text-muted" th:text="${b.customer.phone}"></small>
                </td>
                <td th:text="'Room ' + ${b.room.roomNumber}"></td>
                <td th:text="${b.checkInDate}"></td>
                <td th:text="${b.checkOutDate}"></td>
                <td class="status-cell">
                    <span class="badge"
                          th:classappend="${b.status.name() == 'CONFIRMED'} ? 'badge-confirmed' : 'badge-checked-in'"
                          th:text="${b.status}"></span>
                </td>
                <td class="action-cell">
                    <form th:if="${b.status.name() == 'CONFIRMED'}"
                          th:action="@{/staff/checkin/{id}/checkin(id=${b.id})}"
                          method="post" class="d-inline checkin-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn action-btn-checkin btn-sm">CHECK IN</button>
                    </form>
                    <form th:if="${b.status.name() == 'CHECKED_IN'}"
                          th:action="@{/staff/checkin/{id}/checkout(id=${b.id})}"
                          method="post" class="d-inline checkout-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn action-btn-checkout btn-sm"
                                onclick="return confirm('Confirm check-out?')">CHECK OUT</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/staff-ops.js}"></script>
</body>
</html>
