<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Analytics — AureviaGrand</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<nav th:replace="~{fragments/admin-nav :: nav(active='analytics')}"></nav>

<div class="container section-padding" style="padding-top:120px;">
    <span class="role-pill">Administrator</span>
    <h2 class="mb-1 mt-2">Analytics</h2>
    <p class="text-muted mb-4">Live data from all bookings and revenue</p>

    <!-- KPI Cards -->
    <div class="row g-4 mb-5">
        <div class="col-md-2">
            <div class="card card-luxury text-center p-3">
                <div class="fs-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M7 3H17M7 21H17M8 3C8 7 16 7 16 12C16 17 8 17 8 21M16 3C16 7 8 7 8 12C8 17 16 17 16 21" stroke="currentColor" stroke-width="2"/></svg></div>
                <h4 class="fw-bold gold-text" th:text="${pendingCount}">0</h4>
                <p class="text-muted mb-0 small">Pending</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card card-luxury text-center p-3">
                <div class="fs-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2"/></svg></div>
                <h4 class="fw-bold gold-text" th:text="${confirmedCount}">0</h4>
                <p class="text-muted mb-0 small">Confirmed</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card card-luxury text-center p-3">
                <div class="fs-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" stroke="currentColor" stroke-width="2"/><path d="M9 7h2v2H9zM13 7h2v2h-2zM9 11h2v2H9zM13 11h2v2h-2zM11 21v-4h2v4" fill="currentColor"/></svg></div>
                <h4 class="fw-bold gold-text" th:text="${checkedInCount}">0</h4>
                <p class="text-muted mb-0 small">Checked In</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card card-luxury text-center p-3">
                <div class="fs-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M7 3H17V21H7V3Z" stroke="currentColor" stroke-width="2"/><path d="M10 12H14" stroke="currentColor" stroke-width="2"/><path d="M3 21H21" stroke="currentColor" stroke-width="2"/></svg></div>
                <h4 class="fw-bold gold-text" th:text="${checkedOutCount}">0</h4>
                <p class="text-muted mb-0 small">Checked Out</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card card-luxury text-center p-3">
                <div class="fs-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2"/></svg></div>
                <h4 class="fw-bold gold-text" th:text="${cancelledCount}">0</h4>
                <p class="text-muted mb-0 small">Cancelled</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card card-luxury text-center p-3">
                <div class="fs-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7V17M15 9.5C15 8.7 14.1 8 13 8H11.5C10.1 8 9 8.9 9 10C9 11.1 10.1 12 11.5 12H12.5C13.9 12 15 12.9 15 14C15 15.1 13.9 16 12.5 16H11C9.9 16 9 15.3 9 14.5" stroke="currentColor" stroke-width="2"/></svg></div>
                <h4 class="fw-bold gold-text" th:text="'₹' + ${totalRevenue}">₹0</h4>
                <p class="text-muted mb-0 small">Revenue</p>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-4 mb-5">
        <!-- Booking status doughnut -->
        <div class="col-md-5">
            <div class="card card-luxury p-4">
                <h5 class="fw-bold mb-3">Booking Status Breakdown</h5>
                <canvas id="statusChart" height="240"></canvas>
            </div>
        </div>
        <!-- Revenue by room type bar -->
        <div class="col-md-7">
            <div class="card card-luxury p-4">
                <h5 class="fw-bold mb-3">Revenue by Room Type</h5>
                <canvas id="revenueChart" height="240"></canvas>
            </div>
        </div>
    </div>

    <!-- Revenue Table -->
    <h4 class="fw-bold mb-3">Revenue Breakdown</h4>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Room Type</th>
                <th>Bookings</th>
                <th>Revenue</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${revenueByType}">
                <td th:text="${entry.key}"></td>
                <td th:text="${entry.value.bookingCount}"></td>
                <td th:text="'₹' + ${entry.value.revenue}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pass server data to JS -->
<script th:inline="javascript">
    const statusData = {
        labels: ['Pending', 'Confirmed', 'Checked In', 'Checked Out', 'Cancelled'],
        values: [
            /*[[${pendingCount}]]*/ 0,
            /*[[${confirmedCount}]]*/ 0,
            /*[[${checkedInCount}]]*/ 0,
            /*[[${checkedOutCount}]]*/ 0,
            /*[[${cancelledCount}]]*/ 0
        ]
    };

    const revenueData = {
        labels: /*[[${revenueLabels}]]*/ [],
        values: /*[[${revenueValues}]]*/ []
    };
    </script>

<script>
    const statusCtx = document.getElementById('statusChart');
    if (statusCtx) {
        new Chart(statusCtx, {
            type: 'doughnut',
            data: {
                labels: statusData.labels,
                datasets: [{ data: statusData.values }]
            }
        });
    }

    const revenueCtx = document.getElementById('revenueChart');
    if (revenueCtx) {
        new Chart(revenueCtx, {
            type: 'bar',
            data: {
                labels: revenueData.labels,
                datasets: [{ data: revenueData.values }]
            }
        });
    }
</script>

<script th:src="@{/js/concierge-widget.js}"></script>
</body>
</html>
