<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Room — AureviaGrand</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{fragments/admin-nav :: nav(active='rooms')}"></nav>

<div class="container my-5" style="max-width: 700px;">
    <h2 class="fw-bold mb-4">Edit Room</h2>

    <div class="card card-luxury p-4">
        <form th:action="@{/admin/rooms/{id}/edit(id=${room.id})}"
              method="post" th:object="${room}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Room Number</label>
                    <input type="text" class="form-control"
                           th:field="*{roomNumber}" required/>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Type</label>
                    <select class="form-select" th:field="*{type}" required>
                        <option th:each="t : ${roomTypes}"
                                th:value="${t}" th:text="${t}"
                                th:selected="${t == room.type}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Price / Night (₹)</label>
                    <input type="number" step="0.01" class="form-control"
                           th:field="*{pricePerNight}" required/>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Capacity</label>
                    <input type="number" class="form-control"
                           th:field="*{capacity}" min="1" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Image URL</label>
                    <input type="text" class="form-control" th:field="*{imageUrl}"/>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               th:field="*{available}" id="availableCheck"/>
                        <label class="form-check-label" for="availableCheck">Available</label>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-gold px-5">Save Changes</button>
                <a th:href="@{/admin/rooms}" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
