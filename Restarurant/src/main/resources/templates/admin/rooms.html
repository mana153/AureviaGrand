<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Room Management — AureviaGrand</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{fragments/admin-nav :: nav(active='rooms')}"></nav>

<div class="container section-padding" style="padding-top:120px;">
    <span class="role-pill">Administrator</span>
    <h2 class="mb-4 mt-2">Room Management</h2>

    <!-- Flash -->
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

    <!-- Add Room Form -->
    <div class="card card-luxury p-4 mb-5">
        <h5 class="fw-bold mb-3 gold-text">Add New Room</h5>
        <form th:action="@{/admin/rooms}" method="post" th:object="${newRoom}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Room No.</label>
                    <input type="text" class="form-control" th:field="*{roomNumber}" required/>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Type</label>
                    <select class="form-select" th:field="*{type}" required>
                        <option th:each="t : ${roomTypes}"
                                th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Price/Night (₹)</label>
                    <input type="number" step="0.01" class="form-control"
                           th:field="*{pricePerNight}" required/>
                </div>
                <div class="col-md-1">
                    <label class="form-label">Capacity</label>
                    <input type="number" class="form-control"
                           th:field="*{capacity}" min="1" required/>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Image URL</label>
                    <input type="text" class="form-control" th:field="*{imageUrl}"/>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-gold w-100">Add Room</button>
                </div>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                </div>
            </div>
        </form>
    </div>

    <!-- Rooms Table -->
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Room No.</th>
                <th>Type</th>
                <th>Price/Night</th>
                <th>Capacity</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rooms}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.roomNumber}"></td>
                <td th:text="${r.type}"></td>
                <td th:text="'₹' + ${r.pricePerNight}"></td>
                <td th:text="${r.capacity}"></td>
                <td>
                    <span th:if="${r.available}"  class="badge bg-success">Yes</span>
                    <span th:unless="${r.available}" class="badge bg-secondary">No</span>
                </td>
                <td>
                    <a th:href="@{/admin/rooms/{id}/edit(id=${r.id})}"
                       class="btn btn-outline-secondary btn-sm">Edit</a>

                    <form th:action="@{/admin/rooms/{id}/delete(id=${r.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('Delete this room?')">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
