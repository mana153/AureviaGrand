<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>User Management — AureviaGrand</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{fragments/admin-nav :: nav(active='users')}"></nav>

<div class="container section-padding" style="padding-top:120px;">
    <span class="role-pill">Administrator</span>
    <h2 class="mb-4 mt-2">User Management</h2>
    <p class="text-muted">Use customer IDs when creating partner API keys (e.g. Zomato).</p>

    <!-- Flash -->
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Status</th>
                <th>Joined</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.fullName}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.phone}"></td>
                <td>
                        <span class="badge bg-secondary"
                              th:text="${u.role.name}"></span>
                </td>
                <td>
                        <span th:if="${u.active}"
                              class="badge bg-success">Active</span>
                    <span th:unless="${u.active}"
                          class="badge bg-danger">Inactive</span>
                </td>
                <td th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}"></td>
                <td>
                    <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}"
                          method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button th:class="${u.active} ?
                                    'btn btn-warning btn-sm' : 'btn btn-success btn-sm'"
                                th:text="${u.active} ? 'Deactivate' : 'Activate'">
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
