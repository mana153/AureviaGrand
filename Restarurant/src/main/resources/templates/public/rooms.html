
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Rooms — Luxury Hotel</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-luxury px-4">

    <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
        &#9670; Luxury Hotel
    </a>

    <div class="ms-auto d-flex gap-3 align-items-center">

        <a th:href="@{/rooms}" class="nav-link">
            Rooms
        </a>

        <a th:href="@{/about}" class="nav-link">
            About
        </a>

        <a th:href="@{/auth/login}" class="btn btn-gold px-4">
            Login
        </a>

        <a th:href="@{/auth/register}" class="btn btn-outline-light px-4">
            Register
        </a>

    </div>

</nav>

<!-- Header -->
<div class="bg-dark text-white text-center py-5">

    <h1 class="fw-bold">
        Our Rooms & Suites
    </h1>

    <p class="text-white-50">
        From cozy singles to royal presidential suites
    </p>

</div>

<!-- Rooms Section -->
<div class="container my-5">

    <div class="row g-4">

        <!-- Room Card -->
        <div class="col-md-4" th:each="room : ${rooms}">

            <div class="card card-luxury h-100 shadow-sm">

                <!-- Room Image -->
                <img th:src="${room.imageUrl}"
                     class="card-img-top room-img"
                     alt="Room Image"/>

                <div class="card-body d-flex flex-column">

                    <!-- Top Badges -->
                    <div class="d-flex justify-content-between align-items-center mb-2">

                        <!-- Room Type -->
                        <span class="badge bg-secondary"
                              th:text="${room.type}">
                        </span>

                        <!-- Availability -->
                        <span class="badge"
                              th:classappend="${room.isAvailable} ? 'bg-success' : 'bg-danger'"
                              th:text="${room.isAvailable} ? 'Available' : 'Unavailable'">
                        </span>

                    </div>

                    <!-- Room Number -->
                    <h5 class="fw-bold"
                        th:text="'Room ' + ${room.roomNumber}">
                    </h5>

                    <!-- Description -->
                    <p class="text-muted small flex-grow-1"
                       th:text="${room.description}">
                    </p>

                    <hr/>

                    <!-- Bottom -->
                    <div class="d-flex justify-content-between align-items-center">

                        <!-- Price -->
                        <div>

                            <div class="gold-text fw-bold fs-5"
                                 th:text="'₹' + ${room.pricePerNight} + '/night'">
                            </div>

                            <small class="text-muted"
                                   th:text="'Capacity: ' + ${room.capacity} + ' guests'">
                            </small>

                        </div>

                        <!-- Book Button -->
                        <a th:href="@{/customer/book/{id}(id=${room.id})}"
                           class="btn btn-gold btn-sm"
                           th:if="${room.isAvailable}">Book Now
                        </a>


                        <!-- Unavailable -->
                        <button class="btn btn-secondary btn-sm"
                                disabled
                                th:unless="${room.isAvailable}">
                            Unavailable
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->
<footer class="text-center py-4 border-top">

    <small class="text-muted">
        &copy; 2025 Luxury Hotel. All rights reserved.
    </small>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
