
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Rooms — AureviaGrand</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-luxury px-4">
    <th:block th:replace="~{fragments/nav-brand :: brand}"></th:block>
    <div class="ms-auto d-flex align-items-center nav-links-group">
        <a th:href="@{/rooms}" class="nav-link active">Rooms</a>
        <a th:href="@{/restaurant}" class="nav-link">Dining</a>
        <a th:href="@{/about}" class="nav-link">About</a>
        <a th:href="@{/auth/login}" class="btn btn-outline-gold btn-sm">Login</a>
    </div>
</nav>

<section class="section-black section-padding" style="padding-top:140px; padding-bottom:70px;">
    <div class="container text-center">
        <h1 class="display-5">Rooms &amp; Suites</h1>
        <p class="text-white-50 mb-0">Timeless interiors, panoramic city views, and restful luxury.</p>
    </div>
</section>

<section class="section-padding pt-5">
    <div class="container">
        <div th:if="${errorMsg}" class="alert alert-warning" th:text="${errorMsg}"></div>

        <div class="card-luxury p-4 mb-5 bg-white">
            <h5 class="mb-3">Refine Your Stay</h5>
            <form th:action="@{/rooms}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Check-in</label>
                    <input type="date" name="checkIn" class="form-control" th:min="${today}" th:value="${checkIn}"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Check-out</label>
                    <input type="date" name="checkOut" class="form-control" th:min="${today}" th:value="${checkOut}"/>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-gold w-100">Search Availability</button>
                </div>
            </form>
        </div>

        <div class="row g-4">
            <div class="col-md-6 col-lg-4 fade-in-up" th:each="room : ${rooms}">
                <article class="card-luxury h-100 bg-white">
                    <img th:src="${room.imageUrl != null && !room.imageUrl.isEmpty() ? room.imageUrl : 'https://images.unsplash.com/photo-1590490360182-c33d57733427?w=1200'}" class="card-img-top" style="height:300px; object-fit:cover;" alt="Room image"/>
                    <div class="p-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="small text-uppercase" style="letter-spacing:.14em;" th:text="${room.type}">Suite</span>
                            <span class="small" th:text="${room.isAvailable} ? 'Available' : 'Reserved'">Available</span>
                        </div>
                        <h4 class="mb-2" th:text="'Room ' + ${room.roomNumber}">Room</h4>
                        <p class="text-muted small mb-3" th:text="${room.description}">Description</p>
                        <div class="d-flex justify-content-between align-items-end">
                            <div>
                                <div class="gold-text fw-semibold" th:text="'₹' + ${room.pricePerNight}"></div>
                                <small class="text-muted" th:text="'Capacity: ' + ${room.capacity} + ' guests'">Capacity</small>
                            </div>
                            <th:block th:if="${room.isAvailable}">
                                <a sec:authorize="hasRole('CUSTOMER')"
                                   th:href="@{/customer/book/{id}(id=${room.id})}"
                                   class="btn btn-outline-gold btn-sm">Reserve</a>
                                <a sec:authorize="!isAuthenticated()"
                                   th:href="@{/auth/login}"
                                   class="btn btn-outline-gold btn-sm">Login to Reserve</a>
                            </th:block>
                            <button th:unless="${room.isAvailable}" class="btn btn-secondary btn-sm" disabled>Unavailable</button>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>

<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    document.querySelectorAll('.fade-in-up').forEach((el) => observer.observe(el));
</script>
<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
