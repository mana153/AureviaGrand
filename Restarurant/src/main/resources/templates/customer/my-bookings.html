<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Bookings — AureviaGrand</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-luxury px-4">
    <th:block th:replace="~{fragments/nav-brand :: brand}"></th:block>
    <div class="ms-auto d-flex flex-wrap align-items-center nav-links-group">
        <a th:href="@{/customer/dashboard}" class="nav-link">Dashboard</a>
        <a th:href="@{/rooms}" class="nav-link">Rooms</a>
        <a th:href="@{/customer/profile}" class="nav-link">Profile</a>
        <form th:action="@{/auth/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn nav-logout-btn btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <span class="role-pill">Guest</span>
            <h2 class="fw-bold mt-2 mb-0">My Bookings</h2>
        </div>
        <a th:href="@{/rooms}" class="btn btn-gold px-4">New Booking</a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
        <div class="fs-1 mb-3"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M3 11V19M21 11V19M3 15H21M5 11V8H10C11.1 8 12 8.9 12 10V11M12 11V9C12 7.9 12.9 7 14 7H19V11" stroke="currentColor" stroke-width="2"/></svg></div>
        <p class="text-muted">No bookings yet. Explore our rooms and plan your stay.</p>
        <a th:href="@{/rooms}" class="btn btn-gold px-4">Browse Rooms</a>
    </div>

    <div th:unless="${#lists.isEmpty(bookings)}" class="row g-4">
        <div class="col-lg-6" th:each="b : ${bookings}">
            <div class="card card-luxury p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h5 class="fw-bold mb-1" th:text="'Room ' + ${b.room.roomNumber}"></h5>
                        <span class="badge bg-secondary" th:text="${b.room.type}"></span>
                    </div>
                    <span class="badge"
                          th:classappend="${b.status.name() == 'PENDING'} ? 'badge-pending' :
                                         (${b.status.name() == 'CONFIRMED'} ? 'badge-confirmed' :
                                         (${b.status.name() == 'CANCELLED'} ? 'badge-cancelled' :
                                         (${b.status.name() == 'CHECKED_IN'} ? 'badge-checked-in' :
                                         'badge-checked-out')))"
                          th:text="${b.status}"></span>
                </div>

                <div class="row text-center mb-3 g-2">
                    <div class="col-4">
                        <small class="text-muted d-block">Check-in</small>
                        <strong th:text="${b.checkInDate}"></strong>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block">Nights</small>
                        <strong th:text="${b.nights}"></strong>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block">Check-out</small>
                        <strong th:text="${b.checkOutDate}"></strong>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-auto">
                    <span class="gold-text fw-bold fs-5" th:text="'₹' + ${b.totalPrice}"></span>
                    <div class="d-flex gap-2 flex-wrap">
                        <span th:if="${b.paid}" class="badge badge-paid">Paid</span>
                        <button th:if="${b.status.name() == 'CONFIRMED' && !b.paid && razorpayEnabled}"
                                type="button" class="btn btn-gold btn-sm pay-btn"
                                th:attr="data-booking-id=${b.id}">
                            Pay Now
                        </button>
                        <form th:if="${b.cancellable}"
                              th:action="@{/customer/bookings/{id}/cancel(id=${b.id})}"
                              method="post" class="mb-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Cancel this booking?')">Cancel</button>
                        </form>
                    </div>
                </div>
                <p th:if="${b.status.name() == 'CONFIRMED' && !b.paid && !razorpayEnabled}"
                   class="small text-muted mt-2 mb-0">Payment: ask admin to configure Razorpay keys.</p>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const csrfToken = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script th:src="@{/js/concierge-widget.js}"></script>
<script>
    document.querySelectorAll('.pay-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const bookingId = btn.dataset.bookingId;
            try {
                const res = await fetch(`/customer/payments/bookings/${bookingId}/create-order`, {
                    method: 'POST',
                    headers: { [csrfHeader]: csrfToken, 'Accept': 'application/json' }
                });
                const contentType = res.headers.get('content-type') || '';
                if (!contentType.includes('application/json')) {
                    alert('Could not start payment. Please refresh and try again.');
                    return;
                }
                const data = await res.json();
                if (!res.ok || data.error) { alert(data.error || 'Could not start payment.'); return; }

                const options = {
                    key: data.keyId,
                    amount: data.amount,
                    currency: data.currency,
                    name: 'AureviaGrand Hotel',
                    description: 'Booking #' + bookingId,
                    order_id: data.orderId,
                    prefill: { name: data.customerName, email: data.customerEmail },
                    handler: async function (response) {
                        const verify = new URLSearchParams({
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_signature: response.razorpay_signature
                        });
                        const vRes = await fetch(
                            `/customer/payments/bookings/${bookingId}/verify?` + verify,
                            { method: 'POST', headers: { [csrfHeader]: csrfToken, 'Accept': 'application/json' } }
                        );
                        const vType = vRes.headers.get('content-type') || '';
                        if (!vType.includes('application/json')) {
                            alert('Payment verification failed. Please contact reception.');
                            return;
                        }
                        const vData = await vRes.json();
                        if (vRes.ok && vData.success) location.reload();
                        else alert(vData.error || 'Payment verification failed');
                    }
                };
                new Razorpay(options).open();
            } catch (e) {
                alert('Could not start payment. Please try again.');
            }
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
