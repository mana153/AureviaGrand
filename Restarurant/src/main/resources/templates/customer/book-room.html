<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Book Room — AureviaGrand</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-luxury px-4">
    <th:block th:replace="~{fragments/nav-brand :: brand}"></th:block>
    <div class="ms-auto d-flex align-items-center nav-links-group">
        <a th:href="@{/customer/dashboard}" class="nav-link">Dashboard</a>
        <a th:href="@{/customer/bookings}" class="nav-link">My Bookings</a>
        <form th:action="@{/auth/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn nav-logout-btn btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container section-padding" style="padding-top:120px;">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- Flash -->
            <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

            <!-- Room Info Card -->
            <div class="card card-luxury mb-4">
                <img th:src="${room.imageUrl}" class="card-img-top"
                     style="height:250px; object-fit:cover;" alt="Room"/>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="badge bg-secondary mb-2"
                                  th:text="${room.type}"></span>
                            <h4 class="fw-bold"
                                th:text="'Room ' + ${room.roomNumber}"></h4>
                            <p class="text-muted" th:text="${room.description}"></p>
                        </div>
                        <div class="text-end">
                            <div class="gold-text fw-bold fs-4"
                                 th:text="'₹' + ${room.pricePerNight} + '/night'"></div>
                            <small class="text-muted"
                                   th:text="'Up to ' + ${room.capacity} + ' guests'"></small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Booking Form -->
            <div class="card card-luxury p-4">
                <h5 class="fw-bold mb-4">Select Your Dates</h5>

                <form th:action="@{/customer/book}" method="post" id="bookingForm">
                    <input type="hidden" th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <input type="hidden" name="roomId" th:value="${room.id}"/>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Check-In Date</label>
                            <input type="date" name="checkIn" id="checkIn"
                                   class="form-control"
                                   th:min="${today}"
                                   th:value="${today}" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Check-Out Date</label>
                            <input type="date" name="checkOut" id="checkOut"
                                   class="form-control"
                                   th:min="${tomorrow}"
                                   th:value="${tomorrow}" required/>
                        </div>
                    </div>

                    <!-- Price Preview -->
                    <div class="card bg-light p-3 mb-4" id="pricePreview">
                        <div class="d-flex justify-content-between">
                            <span>Nights</span>
                            <span id="nightsCount">1</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Price per night</span>
                            <span th:text="'₹' + ${room.pricePerNight}"></span>
                        </div>
                        <hr/>
                        <div class="d-flex justify-content-between fw-bold">
                            <span>Total</span>
                            <span class="gold-text" id="totalPrice"
                                  th:text="'₹' + ${room.pricePerNight}"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-gold w-100 fw-semibold py-2">
                        Confirm Booking
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script th:inline="javascript">
    const pricePerNight = /*[[${room.pricePerNight}]]*/ 0;
    const checkInEl = document.getElementById('checkIn');
    const checkOutEl = document.getElementById('checkOut');
    const nightsEl = document.getElementById('nightsCount');
    const totalEl = document.getElementById('totalPrice');

    function updatePrice() {
        const ci = new Date(checkInEl.value);
        const co = new Date(checkOutEl.value);
        const nights = Math.max(0, (co - ci) / (1000 * 60 * 60 * 24));
        nightsEl.textContent = nights;
        totalEl.textContent = '₹' + (nights * pricePerNight).toLocaleString('en-IN');
    }

    checkInEl.addEventListener('change', updatePrice);
    checkOutEl.addEventListener('change', updatePrice);
    updatePrice();
</script>

<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
