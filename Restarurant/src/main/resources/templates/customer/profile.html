<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Profile — AureviaGrand</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-luxury px-4">
    <th:block th:replace="~{fragments/nav-brand :: brand}"></th:block>
    <div class="ms-auto d-flex align-items-center nav-links-group">
        <a th:href="@{/customer/dashboard}" class="nav-link">Dashboard</a>
        <a th:href="@{/customer/bookings}" class="nav-link">My Bookings</a>
        <form th:action="@{/auth/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn nav-logout-btn btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container section-padding" style="padding-top:120px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-luxury p-4">
                <h4 class="mb-4">My Profile</h4>

                <div th:if="${successMsg}"
                     class="alert alert-success" th:text="${successMsg}"></div>

                <form th:action="@{/customer/profile}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="fullName" class="form-control"
                               th:value="${user.fullName}" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control"
                               th:value="${user.email}" disabled/>
                        <small class="text-muted">Email cannot be changed.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control"
                               th:value="${user.phone}"/>
                    </div>

                    <button type="submit"
                            class="btn btn-gold w-100">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
