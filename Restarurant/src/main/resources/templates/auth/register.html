<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Register — Luxury Hotel</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-bg d-flex align-items-center justify-content-center min-vh-100">

<div class="card auth-card shadow-lg p-4">
    <div class="text-center mb-4">
        <h2 class="gold-text fw-bold">Create Account</h2>
        <p class="text-muted small">Join us for a luxury experience</p>
    </div>

    <!-- Error -->
    <div th:if="${errorMsg}" class="alert alert-danger py-2" th:text="${errorMsg}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${user}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" th:field="*{fullName}" class="form-control"
                   placeholder="John Doe" required/>
            <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}"
                 th:errors="*{fullName}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" th:field="*{email}" class="form-control"
                   placeholder="you@email.com" required/>
            <div class="text-danger small" th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone (optional)</label>
            <input type="text" th:field="*{phone}" class="form-control"
                   placeholder="+91 98765 43210"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control"
                   placeholder="Min 6 characters" required/>
            <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn btn-gold w-100 fw-semibold">Create Account</button>
    </form>

    <p class="text-center mt-3 small">
        Already have an account?
        <a th:href="@{/auth/login}" class="gold-link">Login here</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
