<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — Luxury Hotel</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-bg d-flex align-items-center justify-content-center min-vh-100">

<div class="card auth-card shadow-lg p-4">
    <div class="text-center mb-4">
        <h2 class="gold-text fw-bold">Welcome Back</h2>
        <p class="text-muted small">Sign in to your account</p>
    </div>

    <!-- Success flash -->
    <div th:if="${successMsg}" class="alert alert-success py-2" th:text="${successMsg}"></div>
    <!-- Error -->
    <div th:if="${errorMsg}" class="alert alert-danger py-2" th:text="${errorMsg}"></div>

    <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="username" class="form-control"
                   placeholder="you@email.com" required autofocus/>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required/>
        </div>

        <button type="submit" class="btn btn-gold w-100 fw-semibold">Sign In</button>
    </form>

    <p class="text-center mt-3 small">
        Don't have an account?
        <a th:href="@{/auth/register}" class="gold-link">Register here</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
