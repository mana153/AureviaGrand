<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — AureviaGrand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-bg d-flex align-items-center justify-content-center min-vh-100 py-4">

<div class="card auth-card shadow-lg p-4 mx-2">
    <div class="text-center mb-4">
        <div class="brand-mark mx-auto mb-2">&#9670;</div>
        <h2 class="gold-text mb-1">AUREVIAGRAND</h2>
        <p class="text-muted small mb-0">Lodging &amp; Restaurant Management</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success py-2 small" th:text="${successMsg}"></div>
    <div th:if="${param.error}" class="alert alert-danger py-2 small">
        Invalid email or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-info py-2 small">You have been logged out.</div>

    <form th:action="@{/auth/login}" method="post" id="loginForm" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="username" class="form-control form-control-lg"
                   placeholder="you@gmail.com" required autofocus autocomplete="email"/>
            <div class="text-danger small d-none" id="loginEmailInlineError">Please enter a valid email address</div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   placeholder="••••••••" required/>
        </div>

        <button type="submit" class="btn btn-gold btn-lg w-100 fw-semibold">Sign In</button>
    </form>

    <p class="text-center mt-3 small mb-0">
        New guest?
        <a th:href="@{/auth/register}" class="gold-link">Create account</a>
    </p>
</div>

<script th:src="@{/js/concierge-widget.js}"></script>
<script th:src="@{/js/email-validation.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>bindEmailValidation('#loginForm', 'input[type="email"]', 'loginEmailInlineError');</script>
</body>
</html>
