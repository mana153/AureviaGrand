<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${venue.name} + ' - AureviaGrand'">Venue - AureviaGrand</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-luxury px-4">
    <th:block th:replace="~{fragments/nav-brand :: brand}"></th:block>
    <div class="ms-auto d-flex align-items-center nav-links-group">
        <a th:href="@{/restaurant}" class="nav-link active">Dining</a>
        <a th:href="@{/rooms}" class="nav-link">Rooms</a>
        <a th:href="@{/auth/login}" class="btn btn-outline-gold btn-sm">Login</a>
    </div>
</nav>

<section class="venue-hero text-white d-flex align-items-end" style="padding-top:80px;" th:style="'background-image:linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.65)), url(' + ${venue.coverImage} + ');'">
    <div class="container py-5">
        <span class="badge text-bg-light mb-3" th:text="${venue.cuisineType}">Cuisine</span>
        <h1 class="display-5 fw-bold mb-2" th:text="${venue.name}">Venue</h1>
        <p class="lead mb-1" th:text="${venue.shortDescription}"></p>
        <p class="mb-0"><strong>Operating Hours:</strong> <span th:text="${venue.operatingHours}"></span></p>
    </div>
</section>

<section class="container my-5">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card card-luxury p-4 mb-4">
                <h3 class="fw-bold mb-3">Ambiance & Experience</h3>
                <p class="text-muted mb-0" th:text="${venue.fullDescription}"></p>
            </div>

            <div class="card card-luxury p-4">
                <h3 class="fw-bold mb-3">Menu</h3>
                <div th:each="section : ${venue.menuSections}" class="mb-4" th:attr="data-menu-section=${section.name}">
                    <h5 class="fw-bold border-bottom pb-2 mb-3" th:text="${section.name}">Section</h5>
                    <div class="row g-3">
                        <div class="col-md-6" th:each="item : ${section.items}">
                            <div class="menu-item card border-0 shadow-sm h-100">
                                <img class="menu-item-image"
                                     th:src="${item.imageUrl}"
                                     th:alt="${item.name}"
                                     loading="lazy"
                                     th:data-fallback="${#strings.containsIgnoreCase(section.name, 'Breakfast') ? 'https://images.unsplash.com/photo-1525351484163-7529414344d8?w=600'
                                        : (#strings.containsIgnoreCase(section.name, 'Coffee') || #strings.containsIgnoreCase(section.name, 'Tea') ? 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600'
                                        : (#strings.containsIgnoreCase(section.name, 'Mocktails') || #strings.containsIgnoreCase(section.name, 'Cocktails') ? 'https://images.unsplash.com/photo-1544145945-f90425340c7e?w=600'
                                        : (#strings.containsIgnoreCase(section.name, 'Desserts') ? 'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=600'
                                        : 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600')))}"
                                     onerror="if(!this.dataset.fallbackApplied){this.dataset.fallbackApplied='1';this.src=this.dataset.fallback||'';window.fallbackMenuImage&&window.fallbackMenuImage(this);}">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between gap-2">
                                        <h6 class="fw-bold mb-1" th:text="${item.name}">Item</h6>
                                        <span class="fw-semibold gold-text" th:text="${item.price}">₹000</span>
                                    </div>
                                    <p class="small text-muted mb-0" th:text="${item.description}"></p>
                                    <div class="mt-3">
                                        <div th:if="${isCustomer}" class="border rounded p-2 bg-light-subtle">
                                            <form th:action="@{'/customer/restaurant-orders/' + ${venue.slug}}" method="post" class="row g-2">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <input type="hidden" name="itemName" th:value="${item.name}"/>
                                                <input type="hidden" name="itemDescription" th:value="${item.description}"/>
                                                <input type="hidden" name="itemPrice" th:value="${#strings.replace(item.price, '₹', '')}"/>
                                                <div class="col-4">
                                                    <input type="number" class="form-control form-control-sm" name="quantity" value="1" min="1" required/>
                                                </div>
                                                <div class="col-8">
                                                    <select class="form-select form-select-sm" name="billingType" required>
                                                        <option value="CHARGE_TO_ROOM">Charge to my room</option>
                                                        <option value="PAY_ON_DELIVERY">Pay at table / on delivery</option>
                                                    </select>
                                                </div>
                                                <div class="col-12 d-grid">
                                                    <button type="submit" class="btn btn-gold btn-sm">Order</button>
                                                </div>
                                            </form>
                                        </div>
                                        <div th:unless="${isCustomer}" class="small text-muted">
                                            Please log in or create an account to reserve or order.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card card-luxury p-4 sticky-top" style="top: 100px;">
                <h4 class="fw-bold mb-3">Reserve a Table</h4>

                <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
                <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                <div th:unless="${isCustomer}">
                    <p class="text-muted mb-3">
                        Please log in or create an account to reserve a table.
                    </p>
                    <a class="btn btn-gold w-100 mb-2" th:href="@{/auth/login}">Login to Reserve</a>
                    <a class="btn btn-outline-gold w-100" th:href="@{/auth/register}">Create Account</a>
                </div>

                <form th:if="${isCustomer}" th:action="@{'/customer/restaurant-reservations/' + ${venue.slug}}" method="post" th:object="${reservation}">
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input class="form-control" type="date" th:field="*{date}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Time</label>
                        <input class="form-control" type="time" th:field="*{time}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Guests</label>
                        <input class="form-control" type="number" min="1" max="20" th:field="*{guests}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Special Request</label>
                        <textarea class="form-control" rows="3" th:field="*{specialRequest}" placeholder="Dietary notes, seating preference..."></textarea>
                    </div>
                    <button class="btn btn-gold w-100" type="submit">Reserve a Table</button>
                </form>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>

<script th:src="@{/js/menu-images.js}"></script>
<script th:src="@{/js/concierge-widget.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
